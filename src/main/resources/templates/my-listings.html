<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Listings - YorkU Circle</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/dashboard">YorkU Circle</a>

  <div class="ms-auto">
    <a href="/course-materials" class="btn btn-outline-light me-2">Course Materials</a>
    <a href="/profile" class="btn btn-outline-light me-2">Profile</a>
    <form action="/logout" method="post" style="display:inline;">
      <button type="submit" class="btn btn-light">Logout</button>
    </form>
  </div>
</nav>

<div class="container mt-5">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="mb-1">My Listings</h2>
      <div class="text-muted">Signed in as <span th:text="${user.email}"></span></div>
    </div>
    <a class="btn btn-secondary" href="/dashboard">Back to Dashboard</a>
  </div>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <!-- Add Listing Form -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Add a New Listing</h5>
      <form action="/listings" method="post">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" class="form-control" id="title" name="title" placeholder="e.g. EECS 2311 Textbook" required>
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <input type="text" class="form-control" id="description" name="description" placeholder="e.g. Good condition, some highlights." required>
        </div>
        <div class="mb-3">
          <label for="price" class="form-label">Price ($)</label>
          <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" placeholder="e.g. 40.00" required>
        </div>

        <div class="row g-3">
          <div class="col-md-4">
            <label for="courseCode" class="form-label">Course Code</label>
            <input type="text" class="form-control" id="courseCode" name="courseCode" placeholder="e.g. EECS 2311">
          </div>
          <div class="col-md-4">
            <label for="materialType" class="form-label">Material Type</label>
            <select class="form-select" id="materialType" name="materialType">
              <option value="">(Optional)</option>
              <option value="Textbook">Textbook</option>
              <option value="Lab Kit">Lab Kit</option>
              <option value="Notes">Notes</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="condition" class="form-label">Condition</label>
            <select class="form-select" id="condition" name="condition">
              <option value="">(Optional)</option>
              <option value="New">New</option>
              <option value="Good">Good</option>
              <option value="Fair">Fair</option>
              <option value="Poor">Poor</option>
            </select>
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-4">
            <label for="exchangeType" class="form-label">Exchange Type</label>
            <select class="form-select" id="exchangeType" name="exchangeType">
              <option value="">(Optional)</option>
              <option value="Sell">Sell</option>
              <option value="Trade">Trade</option>
              <option value="Free">Free</option>
              <option value="Giveaway">Giveaway</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="isbn" class="form-label">ISBN (Optional)</label>
            <input type="text" class="form-control" id="isbn" name="isbn" placeholder="e.g. 9780134685991">
          </div>
          <div class="col-md-4">
            <label for="bookstorePrice" class="form-label">Bookstore Price (New) ($, Optional)</label>
            <input type="number" class="form-control" id="bookstorePrice" name="bookstorePrice" step="0.01" min="0" placeholder="e.g. 120.00">
          </div>
        </div>

        <button type="submit" class="btn btn-success">Add Listing</button>
      </form>
    </div>
  </div>

  <!-- Listings Table -->
  <div class="card shadow-sm">
    <div class="card-body">
      <div th:if="${#lists.isEmpty(listings)}" class="text-muted">
        You don't have any listings yet.
      </div>

      <div th:unless="${#lists.isEmpty(listings)}" class="table-responsive">
        <table class="table align-middle">
          <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Price</th>
            <th>Bookstore</th>
            <th>Save</th>
            <th>Status</th>
            <th>Edit</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="l : ${listings}">
            <td th:text="${l.id}"></td>
            <td th:text="${l.title}"></td>
            <td th:text="${l.description}"></td>
            <td th:text="'$' + ${l.price}"></td>
            <td>
              <span th:if="${l.bookstorePrice != null}" th:text="'$' + ${l.bookstorePrice}"></span>
              <span th:unless="${l.bookstorePrice != null}" class="text-muted">—</span>
            </td>
            <td>
              <span th:if="${l.savingsPercent != null}" class="badge bg-info text-dark" th:text="${l.savingsPercent} + '%'"></span>
              <span th:unless="${l.savingsPercent != null}" class="text-muted">—</span>
            </td>
            <td>
              <span class="badge bg-success"
                    th:if="${l.status == T(com.example.demo.domain.ListingStatus).AVAILABLE}">
                AVAILABLE
              </span>
              <span class="badge bg-warning text-dark"
                    th:if="${l.status == T(com.example.demo.domain.ListingStatus).UNAVAILABLE}">
                UNAVAILABLE
              </span>
              <span class="badge bg-secondary"
                    th:if="${l.status == T(com.example.demo.domain.ListingStatus).SOLD}">
                SOLD
              </span>
            </td>
            <td>
              <a th:href="@{/listings/{id}/edit(id=${l.id})}" class="btn btn-outline-primary btn-sm">Edit</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

</body>
</html>
