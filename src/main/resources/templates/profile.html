<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - YorkU Circle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard">YorkU Circle</a>

    <div class="ms-auto d-flex gap-2">
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
        <form action="/logout" method="post" style="display:inline;">
            <button type="submit" class="btn btn-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4" style="max-width: 600px; margin: auto;">
        <h2 class="mb-4">My Profile</h2>

        <dl class="row mb-0">
            <dt class="col-sm-4">Name</dt>
            <dd class="col-sm-8" th:text="${user.name}">—</dd>

            <dt class="col-sm-4">Email</dt>
            <dd class="col-sm-8" th:text="${user.email}">—</dd>

            <dt class="col-sm-4">Student ID</dt>
            <dd class="col-sm-8" th:text="${user.studentId != null} ? ${user.studentId} : '—'">—</dd>

            <dt class="col-sm-4">Phone</dt>
            <dd class="col-sm-8" th:text="${user.phoneNumber != null and !#strings.isEmpty(user.phoneNumber)} ? ${user.phoneNumber} : '—'">—</dd>

            <dt class="col-sm-4">Program</dt>
            <dd class="col-sm-8" th:text="${user.program != null and !#strings.isEmpty(user.program)} ? ${user.program} : '—'">—</dd>

            <dt class="col-sm-4">Campus</dt>
            <dd class="col-sm-8" th:text="${user.campus != null and !#strings.isEmpty(user.campus)} ? ${user.campus} : '—'">—</dd>

            <dt class="col-sm-4">About Me</dt>
            <dd class="col-sm-8" th:text="${user.aboutMe != null and !#strings.isEmpty(user.aboutMe)} ? ${user.aboutMe} : '—'">—</dd>
        </dl>

        <a th:href="@{/profile/edit}" class="btn btn-primary mt-4">Edit Profile</a>
    </div>
</div>

</body>
</html>
