<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Details - YorkU Circle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard">YorkU Circle</a>

    <div class="ms-auto">
        <a href="/course-materials" class="btn btn-outline-light me-2">Course Materials</a>
        <a href="/browse" class="btn btn-outline-light me-2">Browse Listings</a>
        <a href="/my-listings" class="btn btn-outline-light me-2">My Listings</a>
        <a href="/profile" class="btn btn-outline-light me-2">Profile</a>
        <form action="/logout" method="post" style="display:inline;">
            <button type="submit" class="btn btn-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-5">

    <div class="mb-3">
        <a href="/browse" class="btn btn-secondary btn-sm">&larr; Back to Browse</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="card-title mb-0" th:text="${listing.title}"></h2>
                <span>
                    <span class="badge bg-success fs-6"
                          th:if="${listing.status == T(com.example.demo.domain.ListingStatus).AVAILABLE}">AVAILABLE</span>
                    <span class="badge bg-warning text-dark fs-6"
                          th:if="${listing.status == T(com.example.demo.domain.ListingStatus).UNAVAILABLE}">UNAVAILABLE</span>
                    <span class="badge bg-secondary fs-6"
                          th:if="${listing.status == T(com.example.demo.domain.ListingStatus).SOLD}">SOLD</span>
                </span>
            </div>

            <hr>

            <dl class="row">
                <dt class="col-sm-3">Description</dt>
                <dd class="col-sm-9" th:text="${listing.description}"></dd>

                <dt class="col-sm-3">Course Code</dt>
                <dd class="col-sm-9" th:text="${listing.courseCode}"></dd>

                <dt class="col-sm-3">Semester</dt>
                <dd class="col-sm-9" th:text="${listing.semester}"></dd>

                <dt class="col-sm-3">Material Type</dt>
                <dd class="col-sm-9" th:text="${listing.materialType}"></dd>

                <dt class="col-sm-3">Condition</dt>
                <dd class="col-sm-9" th:text="${listing.condition}"></dd>

                <dt class="col-sm-3">Exchange Type</dt>
                <dd class="col-sm-9" th:text="${listing.exchangeType}"></dd>

                <dt class="col-sm-3">Price</dt>
                <dd class="col-sm-9" th:text="'$' + ${listing.price}"></dd>

                <dt class="col-sm-3">ISBN</dt>
                <dd class="col-sm-9">
                    <span th:if="${listing.isbn != null and !#strings.isEmpty(listing.isbn)}" th:text="${listing.isbn}"></span>
                    <span th:unless="${listing.isbn != null and !#strings.isEmpty(listing.isbn)}" class="text-muted">—</span>
                </dd>

                <dt class="col-sm-3">Bookstore Price (New)</dt>
                <dd class="col-sm-9">
                    <span th:if="${listing.bookstorePrice != null}" th:text="'$' + ${listing.bookstorePrice}"></span>
                    <span th:unless="${listing.bookstorePrice != null}" class="text-muted">—</span>
                    <span th:if="${listing.savingsPercent != null}" class="badge bg-info text-dark ms-2" th:text="'Save ' + ${listing.savingsPercent} + '%'"></span>
                </dd>

                <dt class="col-sm-3">Posted by</dt>
                <dd class="col-sm-9" th:text="${listing.sellerEmail}"></dd>
            </dl>

        </div>
    </div>

</div>

</body>
</html>
