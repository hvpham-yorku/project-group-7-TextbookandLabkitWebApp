<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Listings - YorkU Circle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard">YorkU Circle</a>

    <div class="ms-auto">
        <a href="/course-materials" class="btn btn-outline-light me-2">Course Materials</a>
        <a href="/my-listings" class="btn btn-outline-light me-2">My Listings</a>
        <a href="/profile" class="btn btn-outline-light me-2">Profile</a>
        <form action="/logout" method="post" style="display:inline;">
            <button type="submit" class="btn btn-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="mb-1">Browse Listings</h2>
        <p class="text-muted">All course materials posted by students.</p>
    </div>

    <!-- Search + Sort (no filtering) -->
    <form method="get" action="/browse" class="row g-2 align-items-center mb-4">
        <div class="col-12 col-md-8">
            <input type="text" class="form-control" name="q" placeholder="Search by title, course code, description, or ISBN" th:value="${q}">
        </div>
        <div class="col-8 col-md-3">
            <select class="form-select" name="sortBy">
                <option value="newest" th:selected="${sortBy == 'newest'}">Newest</option>
                <option value="priceAsc" th:selected="${sortBy == 'priceAsc'}">Price: Low to High</option>
                <option value="priceDesc" th:selected="${sortBy == 'priceDesc'}">Price: High to Low</option>
                <option value="courseAsc" th:selected="${sortBy == 'courseAsc'}">Course Code: A → Z</option>
                <option value="conditionAsc" th:selected="${sortBy == 'conditionAsc'}">Condition</option>
            </select>
        </div>
        <div class="col-4 col-md-1">
            <button class="btn btn-primary w-100" type="submit">Go</button>
        </div>
    </form>

    <!-- KAN-67: empty state -->
    <div th:if="${#lists.isEmpty(listings)}" class="alert alert-info">
        No listings have been posted yet. Check back later!
    </div>

    <!-- KAN-65: listing cards -->
    <div th:unless="${#lists.isEmpty(listings)}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <div class="col" th:each="l : ${listings}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">

                    <h5 class="card-title" th:text="${l.title}"></h5>

                    <p class="card-text mb-1">
                        <strong>Course:</strong> <span th:text="${l.courseCode}"></span>
                    </p>
                    <p class="card-text mb-1">
                        <strong>Price:</strong> <span th:text="'$' + ${l.price}"></span>
                    </p>

                    <!-- Bookstore comparison -->
                    <div th:if="${l.bookstorePrice != null}" class="mb-2">
                        <div class="text-muted" style="font-size: 0.95rem;">
                            Bookstore (new): <span th:text="'$' + ${l.bookstorePrice}"></span>
                        </div>
                        <span class="badge bg-info text-dark" th:if="${l.savingsPercent != null}" th:text="'Save ' + ${l.savingsPercent} + '%'"></span>
                    </div>
                    <p class="card-text mb-1">
                        <strong>Condition:</strong> <span th:text="${l.condition}"></span>
                    </p>
                    <p class="card-text mb-1">
                        <strong>Exchange:</strong> <span th:text="${l.exchangeType}"></span>
                    </p>

                    <p class="card-text mt-2">
                        <span class="badge bg-success"
                              th:if="${l.status == T(com.example.demo.domain.ListingStatus).AVAILABLE}">AVAILABLE</span>
                        <span class="badge bg-warning text-dark"
                              th:if="${l.status == T(com.example.demo.domain.ListingStatus).UNAVAILABLE}">UNAVAILABLE</span>
                        <span class="badge bg-secondary"
                              th:if="${l.status == T(com.example.demo.domain.ListingStatus).SOLD}">SOLD</span>
                    </p>

                    <!-- KAN-69: link to detail page -->
                    <a th:href="@{/listings/{id}(id=${l.id})}" class="btn btn-primary btn-sm mt-2">View Details</a>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
