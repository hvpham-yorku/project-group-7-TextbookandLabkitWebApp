<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Listing - YorkU Circle</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/dashboard">YorkU Circle</a>

  <div class="ms-auto">
    <a href="/course-materials" class="btn btn-outline-light me-2">Course Materials</a>
    <a href="/profile" class="btn btn-outline-light me-2">Profile</a>
    <form action="/logout" method="post" style="display:inline;">
      <button type="submit" class="btn btn-light">Logout</button>
    </form>
  </div>
</nav>

<div class="container mt-5">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="mb-1">Edit Listing</h2>
      <div class="text-muted">
        Listing ID: <span th:text="${listing.id}"></span>
      </div>
    </div>
    <a class="btn btn-secondary" href="/my-listings">Cancel</a>
  </div>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <!-- Update Section -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Update Details</h5>

      <form th:action="@{/listings/{id}/edit(id=${listing.id})}" method="post">

        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text"
                 class="form-control"
                 id="title"
                 name="title"
                 th:value="${listing.title}"
                 required>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <input type="text"
                 class="form-control"
                 id="description"
                 name="description"
                 th:value="${listing.description}"
                 required>
        </div>

        <div class="mb-3">
          <label for="price" class="form-label">Price ($)</label>
          <input type="number"
                 class="form-control"
                 id="price"
                 name="price"
                 step="0.01"
                 min="0"
                 th:value="${listing.price}"
                 required>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label for="isbn" class="form-label">ISBN (Optional)</label>
            <input type="text"
                   class="form-control"
                   id="isbn"
                   name="isbn"
                   th:value="${listing.isbn}">
          </div>
          <div class="col-md-6">
            <label for="bookstorePrice" class="form-label">Bookstore Price (New) ($, Optional)</label>
            <input type="number"
                   class="form-control"
                   id="bookstorePrice"
                   name="bookstorePrice"
                   step="0.01"
                   min="0"
                   th:value="${listing.bookstorePrice}">
          </div>
        </div>

        <div class="mb-3">
          <label for="status" class="form-label">Status</label>
          <select class="form-select" id="status" name="status">
            <option th:each="s : ${statuses}"
                    th:value="${s}"
                    th:selected="${s == listing.status}"
                    th:text="${s}">
            </option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/my-listings" class="btn btn-outline-secondary ms-2">Cancel</a>

      </form>
    </div>
  </div>


  <div class="text-end">
    <form th:action="@{/listings/{id}/delete(id=${listing.id})}"
          method="post"
          onsubmit="return confirm('Are you sure you want to delete this listing?');">
      <button type="submit" class="btn btn-danger">
        Delete Listing
      </button>
    </form>
  </div>

</div>

</body>
</html>
